[build]
builder = "dockerfile"
dockerfilePath = "docker/Dockerfile.gateway"
# Root Directory in Railway UI must be "" (repo root) so the build context
# includes the full monorepo (pnpm-workspace.yaml, apps/, etc.).

[deploy]
startCommand = "node apps/api-gateway/dist/index.js"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
