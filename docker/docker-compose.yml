# Production docker-compose — builds frontend + gateway + all ML services.
# Run from repo root:  docker compose -f docker/docker-compose.yml up --build
#
# Service ports exposed to host:
#   3000  — web (Next.js)
#   3001  — api-gateway
#   8001  — module1-integrity
#   8002  — module2-collaboration
#   8003  — module3-data
#   8004  — module4-analytics
#   8005  — paper-chat (upload + RAG chat + continuous training)

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: researchly-web
    env_file:
      - ../apps/web/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    environment:
      NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:3001
    restart: unless-stopped

  api-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    container_name: researchly-gateway
    env_file:
      - ../apps/api-gateway/.env
    ports:
      - "3001:3001"
    depends_on:
      - module1-integrity
      - module2-collaboration
      - module3-data
      - module4-analytics
      - paper-chat
    environment:
      MODULE1_URL: http://module1-integrity:8001
      MODULE2_URL: http://module2-collaboration:8002
      MODULE3_URL: http://module3-data:8003
      MODULE4_URL: http://module4-analytics:8004
      PAPER_CHAT_URL: http://paper-chat:8005
      CORS_ORIGIN: http://localhost:3000
    restart: unless-stopped

  module1-integrity:
    build:
      context: ..
      dockerfile: services/module1-integrity/Dockerfile
    container_name: researchly-module1
    env_file:
      - ../services/.env
    ports:
      - "8001:8001"
    volumes:
      - model_cache:/app/models
    restart: unless-stopped

  module2-collaboration:
    build:
      context: ..
      dockerfile: services/module2-collaboration/Dockerfile
    container_name: researchly-module2
    env_file:
      - ../services/.env
    ports:
      - "8002:8002"
    volumes:
      - model_cache:/app/models
    restart: unless-stopped

  module3-data:
    build:
      context: ..
      dockerfile: services/module3-data/Dockerfile
    container_name: researchly-module3
    env_file:
      - ../services/.env
    ports:
      - "8003:8003"
    volumes:
      - model_cache:/app/models
    restart: unless-stopped

  module4-analytics:
    build:
      context: ..
      dockerfile: services/module4-analytics/Dockerfile
    container_name: researchly-module4
    env_file:
      - ../services/.env
    ports:
      - "8004:8004"
    volumes:
      - model_cache:/app/models
    restart: unless-stopped

  paper-chat:
    build:
      context: ..
      dockerfile: services/paper-chat/Dockerfile
    container_name: researchly-paper-chat
    env_file:
      - ../services/.env
    ports:
      - "8005:8005"
    volumes:
      - model_cache:/app/models
    restart: unless-stopped

volumes:
  model_cache:
