# Prophet-specific config (used alongside arima_config.yaml)
# Owner: H W S S Jayasundara (Module 4)

model:
  name: prophet-trend
  type: prophet

params:
  growth: linear
  changepoint_prior_scale: 0.05
  seasonality_prior_scale: 10.0
  holidays_prior_scale: 10.0
  seasonality_mode: additive
  yearly_seasonality: true
  weekly_seasonality: false
  daily_seasonality: false

custom_seasonalities:
  - name: academic_semester
    period: 182.5
    fourier_order: 3
  - name: academic_quarter
    period: 91.25
    fourier_order: 2

training:
  cross_validation:
    initial: "730 days"
    period: "180 days"
    horizon: "365 days"

output:
  model_dir: services/module4-analytics/models/forecasting/prophet/
