# Model 6: Proposal Generator LLM — RAG + LoRA fine-tuning
# Owner: K D T Kariyawasam (Module 1)

model:
  name: proposal-generator
  base: mistralai/Mistral-7B-Instruct-v0.2
  fallback_base: meta-llama/Llama-2-7b-chat-hf
  type: causal-lm-lora

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "v_proj"]
  task_type: CAUSAL_LM

rag:
  retriever: sbert
  vector_store: supabase_pgvector
  top_k: 5
  similarity_threshold: 0.7

training:
  epochs: 3
  batch_size: 4
  optimizer: adamw
  learning_rate: 0.0002
  weight_decay: 0.01
  max_length: 2048
  fp16: true
  gradient_accumulation_steps: 8
  gradient_checkpointing: true

data:
  source: ml/data/processed/proposals/

output_format:
  type: json
  fields:
    - problem_statement
    - objectives
    - methodology
    - expected_outcomes

output:
  model_dir: services/module1-integrity/models/proposal_lora/
  version_prefix: proposal-v
