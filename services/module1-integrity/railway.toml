[build]
builder = "dockerfile"
dockerfilePath = "services/module1-integrity/Dockerfile"
# In Railway UI: Root Directory = repo root, Dockerfile = "services/module1-integrity/Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
