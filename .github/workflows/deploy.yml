name: Auto Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

env:
  # Vercel project info (not secrets — just IDs)
  VERCEL_ORG_ID: team_8WooNHjdZdVLuHI7PhUWnPhS
  VERCEL_PROJECT_ID: prj_rmmLPgTnBLJIbrEFLCNR8AN8jRQP

jobs:
  # ── Frontend: deploy to Vercel ─────────────────────────────────────────────
  deploy-frontend:
    name: "Frontend → Vercel"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Vercel (production)
        working-directory: apps/web
        run: |
          npm install -g vercel@latest
          vercel --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}

  # ── Backend: Railway auto-deploys via its native GitHub integration ───────
  # Each Railway service is connected directly to this GitHub repo in the
  # Railway dashboard (Service → Settings → Source → GitHub). Railway watches
  # the relevant sub-path and redeploys automatically on every push to main.
  # No Railway CLI token is needed here.
